<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Adir Enterprises – Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --apple-blue: #0071e3; --apple-bright: #00ca4e; --navy: #0A1628; --navy-mid: #142236; --white: #ffffff; --grey: #a1a1a6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--navy); color: var(--white); font-family: 'Barlow', sans-serif; padding-top: 100px; }
        
        nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 4rem; background: rgba(10,22,40,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,113,227,0.2); }
        .logo { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; }
        .logo-icon { width: 42px; height: 42px; background: var(--apple-blue); clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%); display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 22px; height: 22px; fill: var(--white); }
        .logo-text { display: flex; flex-direction: column; line-height: 1; }
        .logo-text span:first-child { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--white); letter-spacing: 2px; }
        .logo-text span:last-child { font-size: 0.65rem; color: var(--apple-bright); letter-spacing: 3px; text-transform: uppercase; }
        
        /* THE FIX: Clean navigation styles targeting separate files */
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { color: var(--grey); text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--apple-blue); }
        
        .hero { padding: 6rem 4rem; max-width: 800px; }
        .hero h1 { font-size: 4rem; font-weight: 700; margin-bottom: 1.5rem; }
        .hero h1 em { font-style: normal; color: var(--apple-bright); }
        .hero p { color: var(--grey); font-size: 1.2rem; line-height: 1.8; margin-bottom: 2rem; }
        .btn { display: inline-block; background: var(--apple-blue); color: var(--white); padding: 0.8rem 2rem; text-decoration: none; border-radius: 20px; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        footer { background: #050E1A; padding: 3rem 4rem; margin-top: 4rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .footer-socials { display: flex; gap: 1rem; }
        .social-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .social-icon svg { width: 18px; height: 18px; fill: var(--grey); }
        .social-icon.fb:hover { background: #1877F2; }
        .social-icon.tw:hover { background: #1DA1F2; }
        .social-icon.ig:hover { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .social-icon.ln:hover { background: #0077B5; }
        .social-icon.yt:hover { background: #FF0000; }
        .social-icon:hover svg { fill: white; transform: scale(1.1); }
    </style>
</head>
